<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Lottery Lab{% endblock %}</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('lotterylab-theme');
        var valid = ['terminal', 'broadsheet', 'hardwood', 'midnight', 'matrix'];
        if (t && valid.indexOf(t) !== -1) {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/static/lottery-lab.css?v={{ css_version }}">
</head>
<body>
  <header>
    <div class="container">
      <div class="header-top">
        <a href="/" class="logo" style="text-decoration:none">Lottery<svg class="logo-ball" viewBox="0 0 24 24" width="17" height="17" aria-hidden="true" focusable="false"><defs><radialGradient id="lb-g" cx="36%" cy="30%" r="70%"><stop offset="0%" stop-color="var(--accent-hi)"/><stop offset="100%" stop-color="var(--accent-dim)"/></radialGradient><clipPath id="lb-c"><circle cx="12" cy="12" r="11.5"/></clipPath></defs><circle cx="12" cy="12" r="11.5" fill="url(#lb-g)"/><g clip-path="url(#lb-c)" stroke="rgba(0,0,0,0.22)" stroke-width="1.1" fill="none" stroke-linecap="round"><path d="M.5 12C4 4 20 4 23.5 12"/><path d="M.5 12C4 20 20 20 23.5 12"/><line x1="12" y1=".5" x2="12" y2="23.5"/></g><ellipse cx="8.5" cy="7" rx="3" ry="2" fill="rgba(255,255,255,0.28)" transform="rotate(-20,8.5,7)"/><circle cx="12" cy="12" r="5.2" fill="rgba(0,0,0,0.18)" clip-path="url(#lb-c)"/><text x="12" y="15.5" text-anchor="middle" font-size="7.5" font-weight="700" font-family="monospace" fill="rgba(255,255,255,0.95)">1</text></svg>Lab</a>
        <span class="header-meta">13 systems · Monte Carlo</span>
        <div class="header-right">
          <span class="theme-switch">
            <label for="theme-select">Theme</label>
            <select id="theme-select" aria-label="Color theme">
              <option value="terminal">Terminal</option>
              <option value="broadsheet">Broadsheet</option>
              <option value="hardwood">Hardwood</option>
              <option value="midnight">Midnight</option>
              <option value="matrix">Matrix</option>
            </select>
          </span>
        </div>
      </div>
      <nav class="header-nav" aria-label="Main navigation">
        <a href="/" class="nav-link">Simulator</a>
        <a href="/chip-window" class="nav-link">Chip Window</a>
        <a href="/leaderboard" class="nav-link">Leaderboard</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
  <script>
    (function () {
      var select = document.getElementById('theme-select');
      if (!select) return;
      var current = document.documentElement.getAttribute('data-theme') || 'terminal';
      select.value = current;
      select.addEventListener('change', function () {
        var next = select.value;
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('lotterylab-theme', next); } catch (e) {}
      });
    })();

    (function () {
      var path = window.location.pathname.replace(/\/$/, '') || '/';
      document.querySelectorAll('.nav-link').forEach(function (a) {
        var href = (a.getAttribute('href') || '').replace(/\/$/, '') || '/';
        var match = (href === '/' ? path === '/' : path === href || path.startsWith(href + '/'));
        if (match) a.classList.add('active');
      });
    })();
  </script>
</body>
</html>
