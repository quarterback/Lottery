<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Lottery Lab{% endblock %}</title>
  <script>
    // Apply persisted theme before first paint to avoid FOUC.
    (function () {
      try {
        var t = localStorage.getItem('lotterylab-theme');
        var valid = ['terminal', 'light', 'paper', 'solarized', 'matrix'];
        if (t && valid.indexOf(t) !== -1) {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) { /* localStorage blocked */ }
    })();
  </script>
  <style>
    /* ── Custom properties ──────────────────────────────── */
    :root {
      --font:    'Berkeley Mono', 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
      --fs:      12px;
      --fs-sm:   11px;
      --fs-lg:   14px;
      --fs-xl:   18px;
      --radius:  2px;
    }

    /* ── Theme: terminal (default dark / Bloomberg) ─────── */
    :root,
    :root[data-theme="terminal"] {
      --bg:         #0a0a0a;
      --bg-alt:     #141414;
      --bg-2:       #1c1c1c;
      --fg:         #e8e8e8;
      --fg-dim:     #888;
      --fg-faint:   #444;
      --accent:     #ff8c00;
      --accent-dim: #a85c00;
      --accent-hi:  #ffaa33;
      --accent-bg:  #1a0f00;
      --green:      #4ade80;
      --green-bg:   #001a10;
      --green-border:#2a6640;
      --red:        #f87171;
      --blue:       #60a5fa;
      --border:     #2a2a2a;
      --border-2:   #333;
      --warn-bg:    #1a1200;
      --warn-border:#3a2a00;
      --warn-fg:    #ccaa44;
      --btn-primary-fg: #000;
      color-scheme: dark;
    }

    /* ── Theme: light (paper / WSJ) ─────────────────────── */
    :root[data-theme="light"] {
      --bg:         #f7f7f5;
      --bg-alt:     #ececea;
      --bg-2:       #e2e2df;
      --fg:         #1a1a1a;
      --fg-dim:     #555;
      --fg-faint:   #999;
      --accent:     #c75a00;
      --accent-dim: #e59550;
      --accent-hi:  #a04800;
      --accent-bg:  #fff0e0;
      --green:      #108040;
      --green-bg:   #e0f4e6;
      --green-border:#5aa070;
      --red:        #c13030;
      --blue:       #2060c0;
      --border:     #d0d0cc;
      --border-2:   #b8b8b3;
      --warn-bg:    #fff4d0;
      --warn-border:#e0c060;
      --warn-fg:    #7a5a10;
      --btn-primary-fg: #fff;
      color-scheme: light;
    }

    /* ── Theme: paper (warm off-white) ──────────────────── */
    :root[data-theme="paper"] {
      --bg:         #f4ecd8;
      --bg-alt:     #ebe0c2;
      --bg-2:       #e0d2ae;
      --fg:         #2c2416;
      --fg-dim:     #6a5a3c;
      --fg-faint:   #a08c68;
      --accent:     #a0521c;
      --accent-dim: #c89060;
      --accent-hi:  #7a3a10;
      --accent-bg:  #f2dcb8;
      --green:      #406820;
      --green-bg:   #e4ecc8;
      --green-border:#80a060;
      --red:        #982020;
      --blue:       #2858a0;
      --border:     #c8b890;
      --border-2:   #a89870;
      --warn-bg:    #f4e4b8;
      --warn-border:#c8a850;
      --warn-fg:    #6a5010;
      --btn-primary-fg: #fff;
      color-scheme: light;
    }

    /* ── Theme: solarized dark ──────────────────────────── */
    :root[data-theme="solarized"] {
      --bg:         #002b36;
      --bg-alt:     #073642;
      --bg-2:       #0a4050;
      --fg:         #eee8d5;
      --fg-dim:     #93a1a1;
      --fg-faint:   #586e75;
      --accent:     #cb4b16;
      --accent-dim: #8a3510;
      --accent-hi:  #e5622a;
      --accent-bg:  #1a1508;
      --green:      #859900;
      --green-bg:   #0c3030;
      --green-border:#3a5a20;
      --red:        #dc322f;
      --blue:       #268bd2;
      --border:     #0e4050;
      --border-2:   #14556a;
      --warn-bg:    #1f1a00;
      --warn-border:#4a3a00;
      --warn-fg:    #b58900;
      --btn-primary-fg: #fdf6e3;
      color-scheme: dark;
    }

    /* ── Theme: matrix (black / phosphor green) ─────────── */
    :root[data-theme="matrix"] {
      --bg:         #000000;
      --bg-alt:     #060d06;
      --bg-2:       #0a1a0a;
      --fg:         #c8ffc8;
      --fg-dim:     #5a9a5a;
      --fg-faint:   #2a5a2a;
      --accent:     #00ff66;
      --accent-dim: #007a30;
      --accent-hi:  #60ff90;
      --accent-bg:  #031a0a;
      --green:      #00ff66;
      --green-bg:   #031a0a;
      --green-border:#007a30;
      --red:        #ff4040;
      --blue:       #40e0d0;
      --border:     #0f2a0f;
      --border-2:   #1a3a1a;
      --warn-bg:    #1a1a00;
      --warn-border:#3a3a00;
      --warn-fg:    #d0d040;
      --btn-primary-fg: #000;
      color-scheme: dark;
    }

    /* ── Reset ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: var(--fs); background: var(--bg); color: var(--fg); }
    body {
      font-family: var(--font);
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ─────────────────────────────────────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    .logo {
      font-size: var(--fs-lg);
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .logo span { color: var(--fg-dim); }
    .tagline {
      font-size: var(--fs-sm);
      color: var(--fg-dim);
    }
    .header-right {
      margin-left: auto;
      font-size: var(--fs-sm);
      color: var(--fg-faint);
    }

    /* ── Main ───────────────────────────────────────────── */
    main { padding: 32px 0 64px; }

    /* ── Section titles ─────────────────────────────────── */
    .section-title {
      font-size: var(--fs-sm);
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Forms ──────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px 32px;
    }
    @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: var(--fs-sm);
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .field input[type="number"],
    .field input[type="text"],
    .field select {
      background: var(--bg-alt);
      border: 1px solid var(--border-2);
      color: var(--fg);
      font-family: var(--font);
      font-size: var(--fs);
      padding: 8px 10px;
      border-radius: var(--radius);
      width: 100%;
    }
    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .field-hint {
      font-size: var(--fs-sm);
      color: var(--fg-faint);
    }

    /* ── Checkbox grid ──────────────────────────────────── */
    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }
    .checkbox-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .checkbox-item:hover { border-color: var(--accent-dim); }
    .checkbox-item input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .checkbox-item.checked { border-color: var(--accent); background: var(--accent-bg); }
    .cb-name {
      font-size: var(--fs);
      color: var(--fg);
      line-height: 1.4;
    }
    .cb-tag {
      font-size: 10px;
      color: var(--fg-dim);
      margin-top: 2px;
    }

    /* ── Buttons ────────────────────────────────────────── */
    .btn {
      display: inline-block;
      padding: 10px 24px;
      font-family: var(--font);
      font-size: var(--fs);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: var(--radius);
      border: none;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--btn-primary-fg);
    }
    .btn-primary:hover { background: var(--accent-hi); }
    .btn-secondary {
      background: var(--bg-alt);
      color: var(--fg);
      border: 1px solid var(--border-2);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Tables ─────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--fs-sm);
    }
    th {
      background: var(--bg-2);
      color: var(--fg-dim);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 8px 10px;
      text-align: right;
      border-bottom: 1px solid var(--border-2);
    }
    th:first-child { text-align: left; }
    td {
      padding: 6px 10px;
      text-align: right;
      border-bottom: 1px solid var(--border);
      color: var(--fg);
    }
    td:first-child { text-align: left; color: var(--fg-dim); }
    tr:hover td { background: var(--bg-alt); }

    /* ── Metric cards ───────────────────────────────────── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }
    .metric-card {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .metric-label {
      font-size: 10px;
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }
    .metric-value {
      font-size: var(--fs-xl);
      color: var(--fg);
      font-weight: 700;
      line-height: 1.2;
    }
    .metric-value.good { color: var(--green); }
    .metric-value.bad  { color: var(--red); }
    .metric-value.accent { color: var(--accent); }
    .metric-sub {
      font-size: var(--fs-sm);
      color: var(--fg-faint);
      margin-top: 2px;
    }

    /* ── Comparison diff highlight ──────────────────────── */
    .diff-better { color: var(--green); }
    .diff-worse  { color: var(--red); }
    .diff-same   { color: var(--fg-dim); }

    /* ── Inline SVG charts ──────────────────────────────── */
    .chart-wrap {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 24px;
    }
    .chart-title {
      font-size: var(--fs-sm);
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .chart-legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: var(--fs-sm);
      color: var(--fg-dim);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Result section layout ──────────────────────────── */
    .results-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 24px;
    }
    .results-title {
      font-size: var(--fs-lg);
      color: var(--fg);
      font-weight: 700;
    }
    .results-meta {
      font-size: var(--fs-sm);
      color: var(--fg-faint);
    }

    .comparison-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 840px) { .comparison-grid { grid-template-columns: 1fr; } }

    .system-badge {
      display: inline-block;
      padding: 3px 8px;
      font-size: var(--fs-sm);
      border-radius: var(--radius);
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .badge-0 { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-dim); }
    .badge-1 { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }

    /* ── Notices ────────────────────────────────────────── */
    .notice {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: var(--fs-sm);
      margin-bottom: 16px;
    }
    .notice-warn {
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      color: var(--warn-fg);
    }
    .notice-info {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      color: var(--fg-dim);
    }

    /* ── Progress indicator ─────────────────────────────── */
    .loading { display: none; }
    body.simulating .loading { display: flex; }
    body.simulating .submit-btn { display: none; }
    .loading {
      align-items: center;
      gap: 10px;
      color: var(--fg-dim);
      font-size: var(--fs-sm);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Theme switcher ─────────────────────────────────── */
    .theme-switch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 12px;
    }
    .theme-switch label {
      font-size: 10px;
      color: var(--fg-faint);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .theme-switch select {
      background: var(--bg-alt);
      border: 1px solid var(--border-2);
      color: var(--fg);
      font-family: var(--font);
      font-size: var(--fs-sm);
      padding: 3px 6px;
      border-radius: var(--radius);
      cursor: pointer;
    }
    .theme-switch select:focus { outline: none; border-color: var(--accent); }

    /* ── Spacers ────────────────────────────────────────── */
    .mt-8  { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }
    .mt-32 { margin-top: 32px; }
    .mb-8  { margin-bottom: 8px; }
    .mb-16 { margin-bottom: 16px; }
    .mb-24 { margin-bottom: 24px; }
    .gap-4 { gap: 4px; }

    /* ── Collapsible details/summary ────────────────────── */
    details { margin: 0; }
    summary {
      cursor: pointer;
      font-size: 10px;
      color: var(--fg-faint);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
      user-select: none;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before {
      content: "▶";
      font-size: 8px;
      display: inline-block;
      transition: transform 0.15s;
    }
    details[open] summary::before { transform: rotate(90deg); }
    summary:hover { color: var(--accent); }
    .details-body {
      margin-top: 8px;
      padding: 10px 12px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: var(--fs-sm);
      color: var(--fg-dim);
      line-height: 1.6;
    }
    .odds-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 10px;
    }
    .odds-table th {
      font-size: 9px;
      padding: 4px 6px;
      background: var(--bg-alt);
    }
    .odds-table td {
      padding: 3px 6px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
    }
    .odds-table .odds-bar {
      height: 6px;
      background: var(--accent);
      border-radius: 1px;
      opacity: 0.7;
      display: inline-block;
    }
    .odds-note {
      font-size: 10px;
      color: var(--fg-faint);
      font-style: italic;
      margin-top: 6px;
    }

    /* ── Mobile-specific overrides ───────────────────────── */
    @media (max-width: 640px) {
      .container { padding: 0 12px; }
      .header-inner { flex-wrap: wrap; gap: 6px; }
      .tagline { display: none; }
      .results-header {
        flex-wrap: wrap;
        gap: 8px;
      }
      .results-header .btn { margin-left: 0 !important; }
      .metrics-grid { grid-template-columns: 1fr 1fr; }
      main { padding: 20px 0 48px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-inner">
        <span class="logo">Lottery<span>//</span>Lab</span>
        <span class="tagline">NBA draft lottery scenario simulator</span>
        <div class="header-right">
          8 systems · Monte Carlo engine
          <span class="theme-switch">
            <label for="theme-select">Theme</label>
            <select id="theme-select" aria-label="Color theme">
              <option value="terminal">Terminal</option>
              <option value="light">Light</option>
              <option value="paper">Paper</option>
              <option value="solarized">Solarized</option>
              <option value="matrix">Matrix</option>
            </select>
          </span>
        </div>
      </div>
    </div>
  </header>
  <main>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
  <script>
    // Theme switcher: sync <select> to current theme, persist on change.
    (function () {
      var select = document.getElementById('theme-select');
      if (!select) return;
      var current = document.documentElement.getAttribute('data-theme') || 'terminal';
      select.value = current;
      select.addEventListener('change', function () {
        var next = select.value;
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('lotterylab-theme', next); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
