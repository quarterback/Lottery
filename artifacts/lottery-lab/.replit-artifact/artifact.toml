kind = "web"
previewPath = "/"
title = "Lottery Lab"
version = "1.0.0"
id = "artifacts/lottery-lab"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21381

[services.development]
run = "cd /home/runner/workspace/artifacts/lottery-lab && uvicorn main:app --host 0.0.0.0 --port 21381 --reload"

[services.production]

[services.production.build]
args = ["pip", "install", "--quiet", "-r", "artifacts/lottery-lab/requirements.txt"]

[services.production.run]
args = ["sh", "-c", "cd artifacts/lottery-lab && uvicorn main:app --host 0.0.0.0 --port ${PORT}"]

[services.production.run.env]
PORT = "8081"

[services.production.health.startup]
path = "/"
